    <title>Summer FOMO — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #f5f0e8;
            --gold: #c9b037;
            --orange: #e07a3d;
            --text-primary: #2d2a26;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--orange) 0%, #e55a2b 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 20px 60px rgba(224, 122, 61, 0.3);
        }

        .logo span {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: white;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        p {
            font-size: 1.25rem;
            color: #5a5650;
            max-width: 400px;
            margin-bottom: 2rem;
        }

        .coming-soon {
            display: inline-block;
            background: rgba(201, 176, 55, 0.15);
            color: var(--gold);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(201, 176, 55, 0.3);
        }
    </style>
</head>
<body>
    <div class="logo">
        <span>25</span>
    </div>
    <h1>Summer FOMO</h1>
    <p>25 Days of Permission to Not Have Fun</p>
    <span class="coming-soon">Coming Soon</span>
</body>
